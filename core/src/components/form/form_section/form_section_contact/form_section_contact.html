<div class="flex-wrapper">
  <dwg-input-text
    id="contact-email"
    autocomplete="email"
    flex-option="4"
    validators='["required", "email"]'
    label="Email Address"
  >
  </dwg-input-text>
  <dwg-input-text id="contact-phone" autocomplete="tel" flex-option="2" label="Phone Number">
  </dwg-input-text>
</div>
