<div class="flex-wrapper">
  <dwg-input-text
    id="address-first"
    autocomplete="address-line1"
    flex-option="4"
    validators='["required", "address"]'
    label="Address Line 1"
  >
  </dwg-input-text>
</div>

<div class="flex-wrapper">
  <dwg-input-text
    id="address-second"
    autocomplete="address-line2"
    flex-option="4"
    validators='["address"]'
    label="Address Line 2"
  >
  </dwg-input-text>
</div>

<div class="flex-wrapper">
  <dwg-input-text
    id="address-city"
    autocomplete="address-level2"
    flex-option="3"
    validators='["required", "address"]'
    label="City"
  >
  </dwg-input-text>
  <dwg-input-text
    id="address-state"
    autocomplete="address-level1"
    flex-option="3"
    validators='["required", "address"]'
    label="State/Region/Province"
  >
  </dwg-input-text>
</div>

<div class="flex-wrapper">
  <dwg-input-text
    id="address-zip"
    autocomplete="postal-code"
    flex-option="3"
    validators='["required", "address"]'
    label="Zip / Postal Code"
  >
  </dwg-input-text>
  <dwg-input-text
    id="address-country"
    autocomplete="country"
    datalist="countries"
    flex-option="3"
    validators='["datalist"]'
    label="Country"
  >
  </dwg-input-text>
</div>
