<dwg-form-section-name id="section-name"></dwg-form-section-name>

<dwg-form-section-address id="section-address"></dwg-form-section-address>

<dwg-form-section-contact id="section-contact"></dwg-form-section-contact>

<dwg-text-area id="message" label="Message" min-rows="3"></dwg-text-area>

<cuf-form-section-membership id="section-membership"></cuf-form-section-membership>

<dwg-input-text
  id="donate-amount"
  label="Donation Amount"
  flex_option="3"
  validators='["required", "money"]'
></dwg-input-text>

<button id="donate-form-button" class="form-submit-button" type="button" tabindex="1">
  Proceed to authorize.net payment portal
</button>

<div id="donate-form-status-message" class="form-status-message"></div>

<form id="hidden-donate-form" method="post">
  <input type="hidden" id="hidden-token-input" name="token" value="" />
  <button type="submit" id="hidden-form-submit-button" hidden></button>
</form>
