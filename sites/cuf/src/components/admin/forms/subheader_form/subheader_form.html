<dwg-input-text id="subheader-title" flex-option="3" label="Title"></dwg-input-text>

<dwg-input-text
  id="subheader-titlelink"
  flex-option="3"
  validators='["prereq=subheader_title"]'
  label="Title Link"
></dwg-input-text>

<dwg-text-area
  id="subheader-description"
  flex-option="3"
  min-rows="3"
  label="Description"
></dwg-text-area>

<button id="submit-button" type="button" tabindex="1" class="form-submit-button">Submit</button>
