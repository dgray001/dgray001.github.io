<div class="flex-wrapper">
  <dwg-input-text
    id="laywitness-volume"
    flex-option="1"
    label="Volume"
    validators='["required", "positive-integer"]'
  ></dwg-input-text>

  <dwg-input-text
    id="laywitness-issue"
    flex-option="1"
    label="Issue"
    validators='["required", "positive-integer"]'
  ></dwg-input-text>
</div>

<dwg-input-text
  id="laywitness-title"
  flex-option="3"
  label="Issue Title"
  validators='["required"]'
></dwg-input-text>

<dwg-checkbox id="checkbox-insert" label="Insert"></dwg-checkbox>

<dwg-checkbox id="checkbox-addendum" label="Addendum"></dwg-checkbox>

<button id="submit-button" type="button" tabindex="1" class="form-submit-button">Submit</button>
