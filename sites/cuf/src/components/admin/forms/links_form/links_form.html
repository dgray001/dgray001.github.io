<dwg-input-text
  id="links-group"
  flex-option="3"
  label="Link Group"
  validators='["required"]'
></dwg-input-text>

<dwg-input-text
  id="links-title"
  flex-option="3"
  label="Name"
  validators='["required"]'
></dwg-input-text>

<dwg-input-text
  id="links-titlelink"
  flex-option="3"
  label="URL"
  validators='["required", "url"]'
></dwg-input-text>

<dwg-text-area
  id="links-description"
  flex-option="3"
  min-rows="3"
  label="Description"
></dwg-text-area>

<button id="submit-button" type="button" tabindex="1" class="form-submit-button">Submit</button>
